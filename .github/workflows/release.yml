---
name: Upload Python Package

concurrency: changelog

on:
  release:
    types: [released]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      UV_PUBLISH_TOKEN: ${{ secrets.PYPI_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v4
        with: { python-version: 3.14 }

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Publish (Keep a) Changelog Manager
        run: |
          uv build --no-sources
          uv publish

  changelog:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Setup Python 3.14
        uses: actions/setup-python@v4
        with: { python-version: '3.14' }

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Update version
        id: version
        run: |
          VERSION=`echo "${GITHUB_REF}" | cut -f 3 -d "/"`
          echo "##[set-output name=version;]$(echo ${VERSION})"
      
      - name: Releasing CHANGELOG.md to version ${{ steps.version.outputs.version }}
        run: uv run changelogmanager release --override-version ${{ steps.version.outputs.version }}

